<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVIL MUSIC</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* Background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(255,0,0,.25),
transparent 60%);
animation:pulse 4s infinite;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/dark-mosaic.png");
opacity:.08;
animation:moveBg 20s linear infinite;
z-index:-1;
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

@keyframes moveBg{
from{transform:translate(0,0);}
to{transform:translate(-200px,-200px);}
}

/* Header */
header{
text-align:center;
padding:60px 20px;
}

.logo{
font-size:4rem;
font-weight:900;
color:#ff0000;
text-shadow:
0 0 10px #ff0000,
0 0 30px #ff0000,
0 0 60px #ff0000;
}

.tagline{
margin-top:10px;
color:#999;
font-size:1.1rem;
}

/* Section */
.section-title{
font-size:2rem;
padding:20px;
color:#ff4444;
}

/* Cards */
.music-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:20px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:20px;
overflow:hidden;
transition:.4s;
box-shadow:0 0 20px rgba(255,0,0,.1);
}

.card:hover{
transform:translateY(-8px);
box-shadow:
0 0 20px rgba(255,0,0,.4),
0 0 50px rgba(255,0,0,.3);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.song{
font-size:1.3rem;
font-weight:bold;
}

.artist{
color:#aaa;
margin-top:5px;
}

.play-btn{
display:block;
margin-top:15px;
padding:12px;
text-align:center;
background:#ff0000;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:.3s;
}

.play-btn:hover{
background:#cc0000;
}

/* Footer */
footer{
text-align:center;
padding:40px 20px;
color:#666;
}
</style>
</head>

<body>

<header>
<h1 class="logo">DEVIL MUSIC</h1>
<p class="tagline">Dark • Neon • Music</p>
</header>

<h2 class="section-title">🔥 Latest Releases</h2>

<div class="music-grid">

<div class="card">
<img src="https://picsum.photos/500/500?1">
<div class="card-content">
<div class="song">Dark Soul</div>
<div class="artist">DEVIL ARTIST</div>
<a class="play-btn" href="#">▶ Play</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/500?2">
<div class="card-content">
<div class="song">Hell Fire</div>
<div class="artist">DEVIL ARTIST</div>
<a class="play-btn" href="#">▶ Play</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500/500?3">
<div class="card-content">
<div class="song">Night Ritual</div>
<div class="artist">DEVIL ARTIST</div>
<a class="play-btn" href="#">▶ Play</a>
</div>
</div>

</div>

<footer>
DEVIL MUSIC © 2026
</footer>

</body>
</html>
